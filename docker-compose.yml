version: '3.8'

services:
  # 1. Banco de Dados Robusto (Postgres + PostGIS para Geolocalização)
  postgres_db:
    image: postgis/postgis:15-3.3
    container_name: rh_saas_postgres
    restart: always
    environment:
      POSTGRES_USER: admin_rh_saas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SenhaForte123!} # Ideal usar arquivo .env depois
      POSTGRES_DB: rh_saas_db
      TZ: UTC # Mantém o fuso horário blindado para o MTE
    ports:
      - "5432:5432"
    volumes:
      - /opt/rh-saas/data/postgres:/var/lib/postgresql/data
    networks:
      - saas_network

  # 2. Redis (Para filas de processamento de ponto e cache de sessões)
  redis_cache:
    image: redis:7-alpine
    container_name: rh_saas_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-SenhaRedis456!}
    ports:
      - "6379:6379"
    volumes:
      - /opt/rh-saas/data/redis:/data
    networks:
      - saas_network

  # 3. PgAdmin (Interface Web para você gerenciar o banco de dados - Opcional)
  pgadmin:
    image: dpage/pgadmin4
    container_name: rh_saas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seusistema.com.br
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-AdminMaster789!}
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge
